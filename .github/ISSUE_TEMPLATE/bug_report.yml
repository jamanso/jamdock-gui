name: Bug report
description: Report something that isn't working as expected
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Before submitting, please:

        1. **Confirm jamdock-suite is installed and on your `$PATH`.**
           Run `which jamlib jamreceptor jamqvina jamrank jamresume qvina02 fpocket obabel`.
        2. **Launch jamdock-gui from a terminal**, not from a desktop icon, so you can paste any stderr output below.
        3. Search [existing issues](https://github.com/jamanso/jamdock-gui/issues) to make sure this isn't already known.

  - type: input
    id: version
    attributes:
      label: jamdock-gui version
      description: 'Output of `python -c "import jamdock_gui; print(jamdock_gui.__version__)"`'
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 on WSL2 / Fedora 40 native / etc."
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: "Output of `python --version`"
      placeholder: "Python 3.11.6"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, step-by-step recipe so a maintainer can reproduce the bug.
      placeholder: |
        1. Open the Receptor tab
        2. Load PDB file 7NZZ
        3. Click "Run Fpocket"
        4. See error in the log console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you thought would happen instead.

  - type: textarea
    id: logs
    attributes:
      label: Terminal output and log-console messages
      description: Paste any error message from the terminal where you launched jamdock-gui, or from the GUI's log console.
      render: shell
