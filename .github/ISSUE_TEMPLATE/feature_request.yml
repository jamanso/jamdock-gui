name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Have a use case the current GUI doesn't cover? Tell us about it. Suggestions that come with a concrete biological/chemical motivation are easiest to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or the limitation you've hit. Avoid jumping straight to the implementation; the "why" matters most.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How would you like it to work? A sketch is enough — UI mockups welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Other tools, workarounds, or designs you weighed.

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Does this belong in jamdock-gui, in the underlying jamdock-suite scripts, or both?
