name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} on Ubuntu
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Qt system libraries
        # PySide6 wheels are statically linked but still dlopen a handful
        # of XCB/EGL libraries at import time. Without these, even
        # `import PySide6.QtWidgets` raises on a fresh runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglx-mesa0 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install jamdock-gui (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check jamdock_gui tests

      - name: Smoke test — package imports cleanly
        run: |
          python -c "import jamdock_gui; print('jamdock_gui', jamdock_gui.__version__)"

      - name: Run unit tests
        # Pure-Python tests for the core modules. They don't need Qt, but
        # we set the offscreen platform anyway in case any import chain
        # touches QApplication.
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v
